<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Login - ERP</title>
    
</h:head>

<h:body>
    <p:dialog header="Acesso ao Sistema" visible="true" closable="false" 
              draggable="false" resizable="false" modal="true" width="350">
        
        <h:form id="frm">
            <p:messages autoUpdate="true" closable="true" />
            
            <p:panelGrid columns="2" styleClass="ui-noborder">
                <p:outputLabel value="Usuário" for="usuario" />
                <p:inputText id="usuario" value="#{loginBean.nomeUsuario}" required="true" />

                <p:outputLabel value="Senha" for="senha" />
                <p:password id="senha" value="#{loginBean.senha}" required="true" />

                <h:panelGroup />
                <p:commandButton value="Login" action="#{loginBean.login}" update="@form" icon="pi pi-sign-in" />               
            </p:panelGrid>
        </h:form>
    </p:dialog>
</h:body>
</html>
