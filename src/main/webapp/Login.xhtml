<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
	<f:facet name="first">
	    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
	    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
	    <meta name="apple-mobile-web-app-capable" content="yes" />
	</f:facet>
    <title>Login - ERP</title>
    <h:outputScript name="js/ripple.js" library="barcelona-layout" />
    <h:outputScript name="js/layout.js" library="barcelona-layout" />
</h:head>

<h:body styleClass="login-body">
         
	<div class="login-panel ui-fluid">
		<div class="ui-g"> 		        
	        <div class="ui-g-12 login-header">
			    <h1>LOGIN</h1>
			    <h2>Acesso ao Sistema</h2>
			    <p:graphicImage name="images/logo.png" library="barcelona-layout" />
			</div>
	        
	        <h:form id="frmn">
	            <p:messages autoUpdate="true" closable="true" />
	            
	            <p:panelGrid columns="2" styleClass="ui-noborder">
	                <p:outputLabel value="Usuário" for="usuario" />
	                <p:inputText id="usuario" value="#{loginBean.nomeUsuario}" required="true" />
	
	                <p:outputLabel value="Senha" for="senha" />
	                <p:password id="senha" value="#{loginBean.senha}" required="true" />
	
	                <h:panelGroup />
	                <p:commandButton value="Login" action="#{loginBean.login}" update="@form" icon="ui-icon-person" />               
	            </p:panelGrid>
	        </h:form>			    
 	    </div>
    </div>
   
    <h:outputStylesheet name="css/layout-deep-purple.css" library="barcelona-layout" />
    <h:outputStylesheet name="css/ripple.css" library="barcelona-layout" /> 
       
</h:body>

</html>
