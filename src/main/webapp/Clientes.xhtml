<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">
    
    <ui:param name="managedBean" value="#{clienteBean}" />
    
    <ui:define name="tituloHead">Clientes</ui:define>
   
    <ui:define name="titulo">    	
    	<i class="fa fa-handshake"></i>
    	<span>Clientes</span>
    </ui:define>

    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar cliente..." 
                     size="30" value="#{clienteBean.termoPesquisa}" />
    </ui:define>
    
    <ui:define name="colunas">
        <p:column headerText="Nome Cliente">#{item.nomeCliente}</p:column>
    </ui:define>
    
    <ui:define name="campos_formulario">
	    <p:outputLabel value="Nome Cliente" for="nomeCliente" />
	    <p:inputText id="nomeCliente" value="#{clienteBean.entidade.nomeCliente}" />
	</ui:define>
	
</ui:composition>
