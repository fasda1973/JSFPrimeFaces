<ui:composition template="/WEB-INF/template/Layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="titulo">Dashboard</ui:define>

    <ui:define name="conteudo">
        <f:metadata>
            <f:viewAction action="#{dashboardBean.inicializar}" />
        </f:metadata>

        <div class="ui-g">
		    <!-- Card Usuários (Azul) -->
		    <div class="ui-g-12 ui-md-6 ui-lg-3">
		        <div style="background: #2196F3; color: white; padding: 20px; border-radius: 8px;">
		            <i class="fa fa-user" style="font-size: 2em; float: right; opacity: 0.5;"></i>
		            <span>USUÁRIOS</span>
		            <h2>#{dashboardBean.totalUsuarios}</h2>
		        </div>
		    </div>
		
		    <!-- Card Empresas (Verde) - Exemplo -->
		    <div class="ui-g-12 ui-md-6 ui-lg-3">
		        <div style="background: #4CAF50; color: white; padding: 20px; border-radius: 8px;">
		            <i class="fa fa-building" style="font-size: 2em; float: right; opacity: 0.5;"></i>
		            <span>EMPRESAS</span>
		            <h2>#{dashboardBean.totalEmpresas}</h2>
		        </div>
		    </div>
		    
		    <!-- Card Pendências (Laranja) - Exemplo -->
		    <div class="ui-g-12 ui-md-6 ui-lg-3">
		        <div style="background: #FF9800; color: white; padding: 20px; border-radius: 8px;">
		            <i class="fa fa-exclamation-triangle" style="font-size: 2em; float: right; opacity: 0.5;"></i>
		            <span>ALERTAS</span>
		            <h2>3</h2>
		        </div>
		    </div>
		</div>
    </ui:define>
</ui:composition>
