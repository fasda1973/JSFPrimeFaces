<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">
    
    <ui:param name="managedBean" value="#{cadastroUsuarioBean}" />
   
    <ui:define name="titulo">    	
    	<i class="fa fa-users"></i>
    	<span>Usuários</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar usuário..." 
                     size="30" value="#{cadastroUsuarioBean.termoPesquisa}" />
    </ui:define>
    
    <ui:define name="colunas">
        <p:column headerText="Nome Usuário">#{item.nomeUsuario}</p:column>
        
        <p:column headerText="Perfil" style="width: 60px; text-align: center;">
		    <p:graphicImage value="/fotos/#{item.fotoCaminho}" 
		                    cache="false" 
		                    style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; object-position: 50% 10%;"
		                    rendered="#{item.fotoCaminho != null}" />
		    
		    <h:panelGroup rendered="#{item.fotoCaminho == null}">
		        <i class="pi pi-user" style="font-size: 1.5rem; color: #ccc;"></i>
		    </h:panelGroup>
		</p:column>
    </ui:define>
    
    <ui:define name="campos_formulario">

    	<h:panelGroup id="fotoPanel" layout="block" style="text-align: center; margin-bottom: 15px;">    
		    <p:graphicImage value="/fotos/#{cadastroUsuarioBean.entidade.fotoCaminho}" 
                cache="false"
                style="width: 120px; height: 120px; border-radius: 50%;"
                rendered="#{cadastroUsuarioBean.entidade.fotoCaminho != null}" />
		
		    <p:graphicImage library="barcelona-layout" name="images/avatar.png" 
		                    style="width: 120px; height: 120px; border-radius: 50%;"
		                    rendered="#{cadastroUsuarioBean.entidade.fotoCaminho == null}" />
		</h:panelGroup> 
	    	    
	    <p:outputLabel value="Nome Usuario" for="nomeUsuario" />
	    <p:inputText id="nomeUsuario" value="#{cadastroUsuarioBean.entidade.nomeUsuario}" />
	    
	    <p:outputLabel value="Senha" for="senha" />
	    <p:password id="senha" value="#{cadastroUsuarioBean.entidade.senha}" 
	    	required="true" feedback="true"
            weakLabel="Fraca" goodLabel="Boa" strongLabel="Forte"/>
            
        <p:outputLabel for="foto" value="Foto do Perfil:" />
		<p:fileUpload id="foto" 
		              listener="#{cadastroUsuarioBean.handleFileUpload}" 
		              mode="advanced" 
		              update="messages" 
		              auto="true" 
		              sizeLimit="2000000" 
		              allowTypes="/(\.|\/)(gif|jpe?g|png)$/"
		              label="Escolher" />
	</ui:define>
