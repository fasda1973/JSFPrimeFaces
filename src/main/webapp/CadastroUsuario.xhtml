<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    template="/WEB-INF/template/Layout.xhtml"> 
    
    <ui:define name="conteudo">
        <h:form id="frm">
            <p:messages autoUpdate="true" closable="true" />

            <p:panel header="Novo Usuário" style="margin-top: 20px">
                <p:panelGrid columns="2" id="painel" styleClass="ui-noborder">
                    <p:outputLabel value="Nome de Usuário" for="nome" />
                    <p:inputText id="nome" value="#{cadastroUsuarioBean.usuario.nomeUsuario}" required="true" />

                    <p:outputLabel value="Senha" for="senha" />
                    <p:password id="senha" value="#{cadastroUsuarioBean.usuario.senha}" 
                                required="true" feedback="true" promptLabel="Digite uma senha"
                                weakLabel="Fraca" goodLabel="Boa" strongLabel="Forte" />

                    <h:panelGroup />
                    <p:commandButton value="Salvar" action="#{cadastroUsuarioBean.salvar}" update="frm" icon="ui-icon-save" />
                </p:panelGrid>
            </p:panel>
            
            <p:dataTable value="#{cadastroUsuarioBean.listaUsuarios}" var="user"
                     style="margin-top: 20px" emptyMessage="Nenhum usuário encontrado.">
            
	            <p:column headerText="ID" width="50">
	                <h:outputText value="#{user.id}" />
	            </p:column>
	            
	            <p:column headerText="Usuário">
	                <h:outputText value="#{user.nomeUsuario}" />
	            </p:column>
	
	            <p:column headerText="Ações" width="100">
	                <p:commandButton icon="ui-icon-edit" update=":frm:painel" process="@this">
	                    <f:setPropertyActionListener value="#{user}" target="#{cadastroUsuarioBean.usuario}" />
	                </p:commandButton>
	
	                <p:commandButton icon="ui-icon-trash" action="#{cadastroUsuarioBean.excluir(user)}"
	                                 update=":frm" process="@this">
	                    <p:confirm header="Confirmação" message="Excluir este usuário?" icon="ui-icon-report-problem" />
	                </p:commandButton>
	            </p:column>
        	</p:dataTable>
        	
        	<p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
	            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
	            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times" />
        	</p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
