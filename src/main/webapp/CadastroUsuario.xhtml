<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    template="/WEB-INF/template/Layout.xhtml"> 
    
    <ui:define name="conteudo">
        <h:form id="frm">
            <p:messages autoUpdate="true" closable="true" />

            <p:panel header="Novo Usuário" style="margin-top: 20px">
                <p:panelGrid columns="2" id="painel" styleClass="ui-noborder">
                    <p:outputLabel value="Nome de Usuário" for="nome" />
                    <p:inputText id="nome" value="#{cadastroUsuarioBean.usuario.nomeUsuario}" required="true" />

                    <p:outputLabel value="Senha" for="senha" />
                    <p:password id="senha" value="#{cadastroUsuarioBean.usuario.senha}" 
                                required="true" feedback="true" promptLabel="Digite uma senha"
                                weakLabel="Fraca" goodLabel="Boa" strongLabel="Forte" />

                    <h:panelGroup />
                    <p:commandButton value="Salvar" action="#{cadastroUsuarioBean.salvar}" update="frm" icon="pi pi-save" />
                </p:panelGrid>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
