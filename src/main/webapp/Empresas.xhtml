<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">

    <ui:param name="managedBean" value="#{empresaBean}" />
    
    <ui:define name="tituloHead">Empresas</ui:define>

    <ui:define name="titulo">
    	<i class="fa fa-building"></i>
    	<span>Empresas</span>
    </ui:define>

    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar empresa..." 
                     size="30" value="#{empresaBean.termoPesquisa}" />
    </ui:define>

    <ui:define name="colunas">
        <p:column headerText="Razão Social">#{item.razaoSocial}</p:column>
        <p:column headerText="Nome Fantasia">#{item.nomeFantasia}</p:column>
        <p:column headerText="Tipo">#{item.tipo.descricao}</p:column>
    </ui:define>

    <ui:define name="campos_formulario">
	    <p:outputLabel value="Razão Social" for="razaoSocial" />
	    <p:inputText id="razaoSocial" value="#{empresaBean.entidade.razaoSocial}" />
	    
	    <p:outputLabel value="Nome Fantasia" for="nomeFantasia" />
	    <p:inputText id="nomeFantasia" value="#{empresaBean.entidade.nomeFantasia}" />
	
	    <p:outputLabel value="Tipo Empresa" for="tipo" />
	    <p:selectOneMenu id="tipo" value="#{empresaBean.entidade.tipo}">
	        <f:selectItem itemLabel="Selecione..." />
	        <f:selectItems value="#{empresaBean.tiposEmpresa}" var="t" 
	                       itemLabel="#{t.descricao}" itemValue="#{t}" />
	    </p:selectOneMenu>
	
	    <p:outputLabel value="CNPJ" for="cnpj" />
	    <p:inputMask id="cnpj" mask="99.999.999/9999-99" value="#{empresaBean.entidade.cnpj}" />
	
	    <p:outputLabel value="Data Fundação" for="dataFundacao" />
	    <p:calendar id="dataFundacao" pattern="dd/MM/yyyy" value="#{empresaBean.entidade.dataFundacao}" />
	
	    <p:outputLabel value="Ramo Atividade" for="ramoAtividade" />
	    <p:autoComplete id="ramoAtividade" value="#{empresaBean.entidade.ramoAtividade}"
	                    completeMethod="#{empresaBean.CompletarRamoAtividade}"
	                    converter="#{empresaBean.ramoAtividadeConverter}"
	                    var="ramo" itemLabel="#{ramo.descricao}" itemValue="#{ramo}" />
	</ui:define>

</ui:composition>
