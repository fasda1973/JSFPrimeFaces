<ui:composition template="/WEB-INF/template/templateCRUD.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <ui:param name="managedBean" value="#{gestaoEmpresasBean}" />

    <ui:define name="titulo">Gestão de Empresas</ui:define>

    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar empresa..." 
                     size="30" value="#{gestaoEmpresasBean.termoPesquisa}" />
    </ui:define>

    <ui:define name="colunas">
        <p:column headerText="Razão Social">#{item.razaoSocial}</p:column>
        <p:column headerText="Nome Fantasia">#{item.nomeFantasia}</p:column>
        <p:column headerText="Tipo">#{item.tipo.descricao}</p:column>
    </ui:define>

    <ui:define name="campos_formulario">
        <p:outputLabel value="Razão Social" for="razaoSocial" />
        <p:inputText id="razaoSocial" value="#{gestaoEmpresasBean.entidade.razaoSocial}" />
        
        <p:outputLabel value="CNPJ" for="cnpj" />
        <p:inputMask id="cnpj" mask="99.999.999/9999-99" value="#{gestaoEmpresasBean.entidade.cnpj}" />
        </ui:define>

</ui:composition>
