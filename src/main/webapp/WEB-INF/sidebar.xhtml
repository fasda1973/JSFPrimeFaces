<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <div class="meu-sidebar">
        <h:form id="menu-form">
           
            <div class="perfil-resumo">
                <h4>Bem-vindo!</h4>
            </div>
			
            <p:menu toggleable="true" styleClass="menu-customizado">
                <p:submenu label="Cadastros">
                    <p:menuitem value="Empresas" icon="pi pi-building" outcome="/GestaoEmpresas" />
                    <p:menuitem value="Usuários" icon="pi pi-users" outcome="/CadastroUsuario" />
                </p:submenu>
                
                <p:submenu label="Sistema">
                    <p:menuitem value="Sair" icon="pi pi-sign-out" action="#{loginBean.logout}" />
                </p:submenu>
            </p:menu>
        </h:form>
    </div>
</ui:composition>
