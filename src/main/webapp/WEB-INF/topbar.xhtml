<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pa="http://primefaces.org/barcelona">
   
<div class="topbar">
	<h:form id="topbar-form" styleClass="topbar-container">
	    <h:link outcome="/GestaoEmpresas" styleClass="topbar-logo">
	        <p:graphicImage name="logo-fasda.svg" library="fasda" styleClass="logo-topbar-footer" />
	    </h:link>
	    
	    <header class="footer-align">
        	<a href="#" id="layout-menu-btn" class="menu-button">
		        <i class="pi pi-bars"></i>
		    </a>
        </header>
     	
     	<div class="topbar-items">
		    <p:menuButton value="#{loginBean.nomeUsuario}" icon="pi pi-user" styleClass="btn-usuario-menu">
		        <p:menuitem value="Meu Perfil" icon="pi pi-id-card" outcome="/Perfil" />
		        <p:menuitem value="Configurações" icon="pi pi-cog" outcome="/Config" />
		        <p:separator />
		        <p:menuitem value="Sair" action="#{loginBean.logout}" icon="pi pi-power-off" />
		    </p:menuButton>
		</div>
    </h:form>
</div>

</ui:composition>
