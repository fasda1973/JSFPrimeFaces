<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pa="http://primefaces.org/barcelona">
   
<div class="topbar">
	<h:form id="topbar-form" styleClass="topbar-container">
	    <h:link outcome="/GestaoEmpresas" styleClass="topbar-logo">
	        <p:graphicImage name="logo2-fasda.png" library="fasda" styleClass="logo-topbar-footer" />
	    </h:link>
     
     
		<div class="topbar-items">		
		    <p:outputLabel value="Usuário: #{loginBean.nomeUsuario} " styleClass="usuario-label"/>
		    <p:commandButton value="Sair" action="#{loginBean.logout}" icon="pi pi-power-off" styleClass="ui-button-flat btn-sair" />			
		</div>
    </h:form>
</div>

</ui:composition>
