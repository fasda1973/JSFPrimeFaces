<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>

	<meta charset="UTF-8" />
	<title>Gestão Empresas</title>

	<h:outputStylesheet library="fasda" name="estilo.css" />

</h:head>

<h:body>
	<header>
		<h:graphicImage library="fasda" name="logo2.png" />
	</header>

	<h2>
		<ui:insert name="titulo" />
	</h2>

	<div id="conteudo">
		<ui:insert name="conteudo" />
	</div>

	<footer> 
		Curso Online "JSF e PrimeFaces Essêncial" 
	</footer>
	
	<h:form>
		<p:confirmDialog global="true">
			<p:commandButton value="Não" icon="fa fa-remove"
				styleClass="ui-confirmdialog-no" />
			
			<p:commandButton value="Sim" icon="fa fa-check"
				styleClass="ui-confirmdialog-yes" />	
		</p:confirmDialog>
		
		<p:menu style="width: 100%; border: none">
	        <p:menuitem value="Empresas" icon="pi pi-fw pi-briefcase" 
	                    outcome="/GestaoEmpresas" />
	        
	        <p:menuitem value="Usuários" icon="pi pi-fw pi-users" 
	                    outcome="/CadastroUsuario" />
	        
	        <p:menuitem value="Sair" icon="pi pi-fw pi-sign-out" 
	                    action="#{loginBean.logout}" />
    	</p:menu>
	</h:form>
	
	<h:outputStylesheet name="css/layout-deep-purple.css" library="barcelona-layout" />
    <h:outputStylesheet name="css/ripple.css" library="barcelona-layout" /> 
</h:body>

</html>
