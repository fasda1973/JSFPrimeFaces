<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>

	<meta charset="UTF-8" />
	<title>Gestão Empresas</title>

	<h:outputStylesheet library="fasda" name="estilo.css" />
	
	<f:facet name="first">
    	<meta name="viewport" content="width=device-width, initial-scale=1" />
	</f:facet>
	
	<link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

</h:head>

<h:body>
	<ui:include src="/WEB-INF/topbar.xhtml" />
    <ui:include src="/WEB-INF/sidebar.xhtml" />

    <main class="layout-content">
        <header class="footer-align">
        	<a href="#" id="layout-menu-btn" class="menu-button">
		        <i class="pi pi-bars"></i>
		    </a>
        </header>

        <h2>
            <ui:insert name="titulo" />
        </h2>

        <div id="conteudo">
            <ui:insert name="conteudo" />
            
            <ui:include src="../footer.xhtml" />
        </div>
        
    </main>

    <h:form>
        <p:confirmDialog global="true">
            <p:commandButton value="Não" icon="ui-icon-close" styleClass="ui-confirmdialog-no" />
            <p:commandButton value="Sim" icon="ui-icon-check" styleClass="ui-confirmdialog-yes" />    
        </p:confirmDialog>
    </h:form>
    
    <h:outputStylesheet name="css/layout-deep-purple.css" library="barcelona-layout" />
    
    <script type="text/javascript">
	    $(document).ready(function() {
	        $("#layout-menu-btn").on("click", function(e) {
	            e.preventDefault();
	         	// Agora ele alterna a classe 'menu-aberto'
	            $("body").toggleClass("menu-aberto");
	        });
	    });
	</script> 
</h:body>

</html>
