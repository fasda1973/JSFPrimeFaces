<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>

	<meta charset="UTF-8" />
	<title>Gestão Empresas</title>

	<h:outputStylesheet library="fasda" name="estilo.css" />
	
	<f:facet name="first">
    	<meta name="viewport" content="width=device-width, initial-scale=1" />
	</f:facet>

</h:head>

<h:body>
	<header>
		<h:graphicImage library="fasda" name="logo2.png" />
	</header>

	<h2>
		<ui:insert name="titulo" />
	</h2>

	<div id="conteudo">
		<ui:insert name="conteudo" />
	</div>
	
	<h:form>
		<p:confirmDialog global="true">
			<p:commandButton value="Não" icon="ui-icon-remove"
				styleClass="ui-confirmdialog-no" />
			
			<p:commandButton value="Sim" icon="ui-icon-check"
				styleClass="ui-confirmdialog-yes" />	
		</p:confirmDialog>
		
		<p:menu style="width: 100%; border: none">
	        <p:menuitem value="Empresas" icon="ui-icon-store" 
	                    outcome="/GestaoEmpresas" />
	        
	        <p:menuitem value="Usuários" icon="ui-icon-group" 
	                    outcome="/CadastroUsuario" />
	        
	        <p:menuitem value="Sair" icon="ui-icon-exit-to-app" 
	                    action="#{loginBean.logout}" />
    	</p:menu>
	</h:form>
	
	<footer> 
		Curso Online "JSF e PrimeFaces Essêncial" 
	</footer>
	
	<h:outputStylesheet name="css/layout-deep-purple.css" library="barcelona-layout" />
    <h:outputStylesheet name="css/ripple.css" library="barcelona-layout" /> 
</h:body>

</html>
